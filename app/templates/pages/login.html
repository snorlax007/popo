<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Popo Cloud — Admin Login</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="/static/css/app.css">
  <style>
    body { display:flex; align-items:center; justify-content:center; min-height:100vh; }
    .login-card { width:100%; max-width:400px; background:var(--surface); border:1px solid var(--border); border-radius:var(--radius-lg); padding:2.5rem; box-shadow:var(--shadow-lg); }
    .login-card h1 { text-align:center; margin-bottom:.25rem; font-size:1.4rem; }
    .login-card p { text-align:center; color:var(--text-muted); margin-bottom:2rem; }
    .logo-big { display:block; text-align:center; font-size:3rem; margin-bottom:1rem; }
    .field { display:flex; flex-direction:column; gap:.4rem; margin-bottom:1.25rem; }
    .field label { font-size:13px; font-weight:500; }
    .field input { padding:.6rem .8rem; border:1px solid var(--border); border-radius:var(--radius-sm); background:var(--bg); color:var(--text); font-size:14px; width:100%; }
    .field input:focus { outline:2px solid var(--accent); border-color:transparent; }
    .error-msg { color:var(--danger); font-size:13px; margin-bottom:1rem; text-align:center; }
    .btn-full { width:100%; }
  </style>
</head>
<body>
  <div class="login-card">
    <span class="logo-big">🤖</span>
    <h1>Popo Cloud</h1>
    <p>Admin Dashboard</p>
    {% if error %}<p class="error-msg">{{ error }}</p>{% endif %}
    <form method="post" action="/admin/login">
      <div class="field">
        <label for="email">Email</label>
        <input type="email" id="email" name="email" placeholder="admin@example.com" required autofocus>
      </div>
      <div class="field">
        <label for="password">Password</label>
        <input type="password" id="password" name="password" required>
      </div>
      <button class="btn btn--primary btn-full" type="submit">Sign in</button>
    </form>
  </div>
</body>
</html>
