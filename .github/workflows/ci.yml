name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: app

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run tests
        run: |
          DATABASE_URL=sqlite+aiosqlite:///:memory: \
            python3 -m pytest tests/ -v --asyncio-mode=auto

  security-scan:
    runs-on: ubuntu-latest
    needs: test

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install SkillSpector
        run: pip install git+https://github.com/nvidia/skillspector

      - name: Scan Popo backend (static)
        run: |
          skillspector scan app/ --no-llm --format sarif --output skillspector.sarif || true

      - name: Upload SARIF to GitHub Security tab
        uses: github/codeql-action/upload-sarif@v3
        if: always()
        with:
          sarif_file: skillspector.sarif
        continue-on-error: true

      - name: Fail on CRITICAL findings
        run: |
          skillspector scan app/ --no-llm --format json --output result.json || true
          python3 -c "
          import json, sys
          data = json.load(open('result.json'))
          criticals = [f for f in data.get('findings', []) if f.get('severity') == 'CRITICAL']
          if criticals:
              print(f'FAIL: {len(criticals)} CRITICAL finding(s):')
              for f in criticals:
                  print(f'  [{f[\"rule_id\"]}] {f[\"message\"][:80]}')
              sys.exit(1)
          print(f'PASS: No CRITICAL findings. Score: {data.get(\"risk_score\", \"??\")}/100')
          "
